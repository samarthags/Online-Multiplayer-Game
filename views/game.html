<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Game Room — Samarth GS Games</title>
    <meta name="description" content="Multiplayer Tic-Tac-Toe by Samarth GS. Live private room — play with a friend instantly.">
    <meta name="author" content="Samarth GS">
    <meta name="robots" content="noindex">
    <link rel="icon" href="https://i.ibb.co/2ZrGMjH/icon.jpg" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css">
    <!-- original game deps - loaded first so our styles override them -->
    <link rel="stylesheet" type="text/css" href="/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/css/style.css">
    <link rel="stylesheet" type="text/css" href="/css/animate.css">

    <style>
        /* ════════════════════════════════════════
           DESIGN TOKENS
        ════════════════════════════════════════ */
        :root {
            --bg: #080808;
            --surface: #111111;
            --surface2: #191919;
            --border: #1f1f1f;
            --border2: #2c2c2c;
            --text: #f0ede6;
            --muted: #4a4a4a;
            --muted2: #7a7a7a;
            --accent: #d4f542;
            --accent-dim: rgba(212,245,66,0.09);
            --accent-glow: rgba(212,245,66,0.22);
            --x: #d4f542;
            --o: #3be0cf;
        }

        /* ════════════════════════════════════════
           RESET & BASE
        ════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg) !important;
            color: var(--text) !important;
            font-family: 'Syne', sans-serif !important;
            overflow-x: hidden;
        }

        /* Kill any background bootstrap puts on body */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ════════════════════════════════════════
           NAV
        ════════════════════════════════════════ */
        .sg-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 30px;
            border-bottom: 1px solid var(--border);
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(18px);
        }
        .sg-brand {
            font-family: 'DM Mono', monospace; font-size: 12px;
            color: var(--muted2); letter-spacing: 0.1em; text-decoration: none;
        }
        .sg-brand b { color: var(--accent); font-weight: 400; }
        .sg-home {
            display: flex; align-items: center; gap: 6px;
            font-family: 'DM Mono', monospace; font-size: 11px;
            color: var(--muted2); text-decoration: none; transition: color 0.2s;
        }
        .sg-home:hover { color: var(--text); }

        /* ════════════════════════════════════════
           PAGE SHELL
        ════════════════════════════════════════ */
        #gameContainer,
        #loadingContainer {
            position: relative; z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 70px;
            min-height: 100vh;
        }

        /* ════════════════════════════════════════
           LOADING / WAITING STATE
        ════════════════════════════════════════ */
        #searchingContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fup 0.55s ease both;
        }

        /* Room code block */
        .sg-code-label {
            font-family: 'DM Mono', monospace; font-size: 9px;
            color: var(--accent); letter-spacing: 0.22em; text-transform: uppercase;
            margin-bottom: 10px;
        }
        #roomId {
            font-family: 'DM Mono', monospace !important;
            font-size: 38px !important; font-weight: 400 !important;
            letter-spacing: 0.24em !important;
            color: var(--text) !important;
            background: var(--surface) !important;
            border: 1px solid var(--border2) !important;
            border-radius: 8px !important;
            padding: 14px 30px !important;
            display: inline-block !important;
            position: relative;
            margin-bottom: 28px !important;
        }
        #roomId::after {
            content: '';
            position: absolute; inset: -1px; border-radius: 8px;
            background: linear-gradient(135deg, rgba(212,245,66,0.07), transparent 60%);
            pointer-events: none;
        }

        #searchingText h1 {
            font-family: 'Syne', sans-serif !important;
            font-size: 22px !important; font-weight: 800 !important;
            letter-spacing: -0.02em !important;
            color: var(--text) !important;
            margin-bottom: 8px !important;
            margin-top: 0 !important;
        }

        #searchState {
            font-family: 'DM Mono', monospace !important;
            font-size: 13px !important; font-weight: 300 !important;
            color: var(--muted2) !important;
            margin-bottom: 30px !important;
        }

        /* Waiting dots */
        .sg-dots span {
            display: inline-block;
            animation: blink 1.5s ease infinite;
            font-size: 18px; color: var(--accent);
        }
        .sg-dots span:nth-child(2) { animation-delay: 0.22s; }
        .sg-dots span:nth-child(3) { animation-delay: 0.44s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

        /* ════════════════════════════════════════
           ALL BUTTONS — global override
           Covers: menuBtn (copy code), rematch btn,
           any .btn, .menuBtn, .loadingMenuBtn injected by JS
        ════════════════════════════════════════ */
        button,
        .btn,
        .menuBtn,
        .loadingMenuBtn,
        #menuBtn,
        input[type="button"],
        input[type="submit"] {
            font-family: 'Syne', sans-serif !important;
            font-weight: 700 !important;
            font-size: 13px !important;
            letter-spacing: 0.05em !important;
            border-radius: 4px !important;
            border: none !important;
            cursor: pointer !important;
            outline: none !important;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s !important;
            padding: 13px 30px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 8px !important;
            /* default style = outline */
            background: var(--surface2) !important;
            color: var(--text) !important;
            box-shadow: none !important;
            text-shadow: none !important;
            line-height: 1 !important;
            min-height: unset !important;
            width: auto !important;
        }
        button:hover,
        .btn:hover,
        .menuBtn:hover,
        #menuBtn:hover {
            transform: translateY(-2px) !important;
            background: var(--surface) !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
        }
        button:active { transform: translateY(0) !important; }

        /* Copy-code / primary action button */
        #menuBtn,
        .loadingMenuBtn {
            background: var(--accent) !important;
            color: #060606 !important;
        }
        #menuBtn:hover,
        .loadingMenuBtn:hover {
            background: var(--accent) !important;
            box-shadow: 0 10px 28px var(--accent-glow) !important;
        }
        /* "Copied!" state */
        #menuBtn.copied {
            background: var(--surface2) !important;
            color: var(--accent) !important;
            border: 1px solid var(--accent) !important;
        }

        /* Rematch / play-again button — whatever class game.js uses */
        .menuBtn:not(#menuBtn),
        .rematchBtn,
        [id*="rematch"],
        [class*="rematch"],
        [id*="Rematch"],
        .menuBtnContainer button:not(#menuBtn) {
            background: transparent !important;
            color: var(--text) !important;
            border: 1px solid var(--border2) !important;
        }
        .menuBtn:not(#menuBtn):hover,
        .rematchBtn:hover {
            border-color: var(--muted2) !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
        }

        /* Button container */
        .menuBtnContainer {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 12px !important;
            margin-top: 10px !important;
        }

        /* ════════════════════════════════════════
           GAME INFO BAR
        ════════════════════════════════════════ */
        #gameInfo {
            width: 100% !important;
            max-width: 380px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 12px 18px !important;
            margin-bottom: 16px !important;
            gap: 8px !important;
        }
        #player, #turn, #gameState {
            font-family: 'DM Mono', monospace !important;
            font-size: 12px !important; font-weight: 400 !important;
            color: var(--muted2) !important;
            letter-spacing: 0.06em !important;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        #gameState { color: var(--text) !important; font-weight: 400 !important; }

        /* ════════════════════════════════════════
           TIC-TAC-TOE BOARD
        ════════════════════════════════════════ */
        #TicTacToeBoard {
            border-collapse: collapse !important;
            border-radius: 8px !important;
            overflow: hidden !important;
            background: var(--surface) !important;
            box-shadow: 0 0 0 1px var(--border2), 0 20px 60px rgba(0,0,0,0.5) !important;
            margin-bottom: 18px !important;
            border: none !important;
        }
        #TicTacToeBoard td,
        #TicTacToeBoard .box {
            width: 118px !important;
            height: 118px !important;
            border: 1px solid var(--border2) !important;
            cursor: pointer !important;
            font-family: 'Syne', sans-serif !important;
            font-size: 46px !important;
            font-weight: 800 !important;
            text-align: center !important;
            vertical-align: middle !important;
            color: var(--text) !important;
            background: var(--surface) !important;
            transition: background 0.15s !important;
            position: relative !important;
            padding: 0 !important;
            line-height: 118px !important;
        }
        #TicTacToeBoard .box:hover {
            background: var(--surface2) !important;
        }
        /* X and O colors — game.js sets innerText */
        #TicTacToeBoard .box:not(:empty) { cursor: default !important; }

        /* ════════════════════════════════════════
           SCOREBOARD
        ════════════════════════════════════════ */
        #scoreBoard {
            width: 100% !important;
            max-width: 356px !important;
            border-collapse: collapse !important;
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            overflow: hidden !important;
            margin-bottom: 16px !important;
        }
        #scoreBoard td,
        #scoreBoard .score {
            padding: 12px 16px !important;
            text-align: center !important;
            border: 1px solid var(--border) !important;
            font-family: 'DM Mono', monospace !important;
            background: var(--surface) !important;
        }
        #XTag { color: var(--x) !important; font-size: 15px !important; font-weight: 700 !important; }
        #OTag { color: var(--o) !important; font-size: 15px !important; font-weight: 700 !important; }
        #tieTag { color: var(--muted2) !important; font-size: 13px !important; }
        #XScore, #OScore, #tieScore {
            font-size: 24px !important; font-weight: 800 !important; color: var(--text) !important;
        }

        /* ════════════════════════════════════════
           FOOTER
        ════════════════════════════════════════ */
        .sg-footer {
            position: relative; z-index: 10;
            border-top: 1px solid var(--border);
            padding: 18px 30px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg);
        }
        .sg-fc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); }
        .sg-fc a { color: var(--accent); text-decoration: none; }
        .sg-fd {
            font-family: 'DM Mono', monospace; font-size: 11px;
            color: var(--muted2); text-decoration: none;
            display: flex; align-items: center; gap: 6px; transition: color 0.2s;
        }
        .sg-fd:hover { color: var(--accent); }

        /* ════════════════════════════════════════
           SHARE HINT
        ════════════════════════════════════════ */
        .sg-hint {
            font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300;
            color: var(--muted2); margin-top: 12px; text-align: center;
        }

        /* ════════════════════════════════════════
           ANIMATIONS
        ════════════════════════════════════════ */
        @keyframes fup { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

        /* ════════════════════════════════════════
           RESPONSIVE
        ════════════════════════════════════════ */
        @media(max-width:480px){
            .sg-nav { padding: 12px 16px; }
            #TicTacToeBoard td, #TicTacToeBoard .box {
                width: 88px !important; height: 88px !important;
                font-size: 34px !important; line-height: 88px !important;
            }
            #roomId { font-size: 28px !important; padding: 12px 20px !important; }
            .sg-footer { flex-direction: column; gap: 8px; text-align: center; }
        }
        @media(max-width:340px){
            #TicTacToeBoard td, #TicTacToeBoard .box {
                width: 70px !important; height: 70px !important;
                font-size: 26px !important; line-height: 70px !important;
            }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="sg-nav">
    <a href="/" class="sg-brand">game.<b>samarthags</b>.in</a>
    <a href="/" class="sg-home"><i class="fa fa-home"></i>&nbsp; Home</a>
</nav>

<!-- ── WAITING STATE ── -->
<div id="loadingContainer">
    <div id="searchingContainer">
        <div id="searchingText">
            <p class="sg-code-label">Your Room Code</p>
            <div id="roomId">——</div>
            <h1>Share &amp; Wait</h1>
            <div id="searchState">
                Waiting for your friend&nbsp;
                <span class="sg-dots">
                    <span>·</span><span>·</span><span>·</span>
                </span>
            </div>
        </div>
        <div class="menuBtnContainer">
            <button id="menuBtn" class="menuBtn loadingMenuBtn" type="button">
                <i class="fa fa-copy"></i>&nbsp; Copy Code
            </button>
        </div>
        <p class="sg-hint">Send this code to your friend so they can join</p>
    </div>
</div>

<!-- ── GAME STATE ── -->
<div id="gameContainer">
    <div id="gameInfo">
        <div id="player"></div>
        <div id="gameState"></div>
        <div id="turn"></div>
    </div>

    <table id="TicTacToeBoard" class="table-bordered">
        <tr>
            <td onclick="boxClick(this)" class="box" id="1"></td>
            <td onclick="boxClick(this)" class="box" id="2"></td>
            <td onclick="boxClick(this)" class="box" id="3"></td>
        </tr>
        <tr>
            <td onclick="boxClick(this)" class="box" id="4"></td>
            <td onclick="boxClick(this)" class="box" id="5"></td>
            <td onclick="boxClick(this)" class="box" id="6"></td>
        </tr>
        <tr>
            <td onclick="boxClick(this)" class="box" id="7"></td>
            <td onclick="boxClick(this)" class="box" id="8"></td>
            <td onclick="boxClick(this)" class="box" id="9"></td>
        </tr>
    </table>

    <table id="scoreBoard" class="table-bordered">
        <tr>
            <td id="XTag" class="score">X</td>
            <td id="tieTag" class="score">Tie</td>
            <td id="OTag" class="score">O</td>
        </tr>
        <tr>
            <td class="score" id="XScore">0</td>
            <td class="score" id="tieScore">0</td>
            <td class="score" id="OScore">0</td>
        </tr>
    </table>

    <!-- game.js injects rematch / menu buttons here -->
    <div class="menuBtnContainer" id="gameBtnContainer"></div>
</div>

<!-- FOOTER -->
<footer class="sg-footer">
    <p class="sg-fc"><a href="https://samarthags.in" target="_blank" rel="noopener">Samartha GS</a></p>
    <a href="https://samarthags.in" class="sg-fd" target="_blank" rel="noopener">
        <i class="fa fa-user"></i> samarthags.in
    </a>
</footer>

<!-- Game scripts -->
<script src="/js/fastclick.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/loading.js"></script>
<script src="/js/game.js"></script>

<script>
(function() {
    // ── Copy room code with visual feedback ──
    function copyRoomID() {
        var roomID = document.getElementById('roomId').innerText.trim();
        if (!roomID || roomID === '——') return;

        var done = function() {
            var btn = document.getElementById('menuBtn');
            if (!btn) return;
            btn.classList.add('copied');
            btn.innerHTML = '<i class="fa fa-check"></i>&nbsp; Copied!';
            setTimeout(function() {
                btn.classList.remove('copied');
                btn.innerHTML = '<i class="fa fa-copy"></i>&nbsp; Copy Code';
            }, 2000);
        };

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(roomID).then(done).catch(function() {
                fallbackCopy(roomID); done();
            });
        } else {
            fallbackCopy(roomID); done();
        }
    }

    function fallbackCopy(text) {
        var el = document.createElement('textarea');
        el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
        document.body.appendChild(el); el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
    }

    var btn = document.getElementById('menuBtn');
    if (btn) btn.addEventListener('click', copyRoomID);

    // ── Re-style any buttons game.js injects after DOM loads ──
    // MutationObserver watches for dynamically added rematch/menu buttons
    var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
                if (node.nodeType !== 1) return;
                // Style injected buttons (rematch, back to menu, etc.)
                var btns = node.matches('button,input[type="button"]')
                    ? [node]
                    : Array.from(node.querySelectorAll('button,input[type="button"]'));
                btns.forEach(function(b) {
                    if (b.id === 'menuBtn') return; // already styled
                    b.style.cssText = ''; // let our CSS take over
                });
            });
        });
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
</body>
</html>
