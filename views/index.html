<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Game</title>
    <link rel="icon" href="https://i.ibb.co/2ZrGMjH/icon.jpg" type="image/png">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: white;
            background-size: 200% 100%;
            animation: gradientBG 10s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            position: relative;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0 50%;
            }
        }

        img.logo {
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 150%;
        }

        .startBtnContainer {
            display: flex;
            flex-direction: column;
            gap: 35px;
            align-items: center;
            margin-top: 20px;
        }

        .startChoiceBtn {
            appearance: none;
            background-color: transparent;
            border: 0.125em solid #1A1A1A;
            border-radius: 0.9375em;
            box-sizing: border-box;
            color: #3B3B3B;
            cursor: pointer;
            display: inline-block;
            font-family: Roobert,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
            font-size: 16px;
            font-weight: 600;
            min-height: 3.75em;
            padding: 1em 2.3em;
            text-align: center;
            transition: all 300ms cubic-bezier(.23, 1, 0.32, 1);
        }

        .startChoiceBtn:disabled {
            pointer-events: none;
        }

        .startChoiceBtn:hover {
            color: #fff;
            background-color: #1A1A1A;
            box-shadow: rgba(0, 0, 0, 0.25) 0 8px 15px;
            transform: translateY(-2px);
        }

        .startChoiceBtn:active {
            box-shadow: none;
            transform: translateY(0);
        }

        /* Profile icon */
        .logo-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .profile-icon {
            font-size: 28px;
            color: #333;
            
            border-radius: 50%;
            padding: 6px;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 28px;
            transition: background 0.3s, color 0.3s;
        }

        

        footer {
            margin-bottom: 10px;
            font-size: 12px;
            color: #555;
            font-family: 'Verdana', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="https://i.ibb.co/QXKTVHN/photo-2024-04-17-11-40-10.jpg" alt="logo">

        <div class="startBtnContainer">
            <form action="/game">
                <button style="font-variant: small-caps;" name="createPrivate" type="submit" class="startChoiceBtn">
                    Startup with Friend
                </button>
            </form>
            <form action="/join">
                <button style="font-variant: small-caps;" name="joinPrivate" type="submit" class="startChoiceBtn">
                    Joinup with Friend
                </button>
            </form>
        </div>

        <footer>
            Created & Developed by Samarth GS
        </footer>
    </div>

    <!-- Profile icon linking to samarthags.in -->
    <div class="logo-container">
        <a href="https://samarthags.in" target="_blank" title="Visit Samarth GS">
            <i class="fa fa-user profile-icon"></i>
        </a>
    </div>
</body>
</html>
